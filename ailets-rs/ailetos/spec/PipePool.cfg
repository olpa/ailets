CONSTANTS
  Readers = {r1, r2}
  Writers = {w1}
  Keys = {k1}

INVARIANTS
  TypeOK
  NoCoexistence
  NoDuplicateLatents
  NoStuckReaders

\* PROPERTIES
\* These are liveness properties - comment out if too slow
\* ReadersEventuallyComplete

CONSTRAINT
  \* Limit state space to prevent explosion
  \* Most bugs appear in first few steps
  TLCGet("level") < 10

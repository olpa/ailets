CONSTANTS
  Readers = {r1, r2}
  Writers = {w1}
  Keys = {k1}

INIT Init
NEXT Next

INVARIANTS
  TypeOK
  NoCoexistence
  NoDuplicateLatents
  \* NoStuckReaders - Disabled: expected to fail in deadlock scenarios

\* PROPERTIES
\* These are liveness properties - comment out if too slow
\* ReadersEventuallyComplete

\* CONSTRAINT
\* Limit state space to prevent explosion - disabled for now
\* TLCGet("level") < 10
